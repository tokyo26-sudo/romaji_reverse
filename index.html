<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反転コトダマ機 -Kotodama Mirror-</title>
<style>
  :root{
    --bg: #14120f;
    --bg2: #1c1915;
    --panel: #211d18;
    --gold: #c9a24b;
    --gold-bright: #e8c874;
    --line: #3a3428;
    --text: #ece6d8;
    --text-dim: #9a9184;
    --danger: #b3552f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% -10%, #2a2418 0%, transparent 45%),
      radial-gradient(circle at 100% 110%, #241f16 0%, transparent 40%),
      var(--bg);
    color:var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 48px 20px 80px;
  }
  .wrap{
    width:100%;
    max-width:760px;
  }
  header{
    text-align:center;
    margin-bottom:36px;
  }
  .eyebrow{
    letter-spacing:0.35em;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .version-badge{
    display:inline-block;
    margin-left:8px;
    padding:2px 8px;
    border:1px solid var(--gold);
    border-radius:20px;
    color:var(--gold-bright);
    font-size:10px;
    letter-spacing:0.05em;
    vertical-align:middle;
  }
  h1{
    font-size:clamp(28px, 5vw, 42px);
    margin:0 0 8px;
    font-weight:700;
    letter-spacing:0.04em;
  }
  h1 span{
    color:var(--gold-bright);
    display:inline-block;
    transform: scaleX(-1);
  }
  .sub{
    color:var(--text-dim);
    font-size:14px;
    line-height:1.7;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px;
    margin-bottom:20px;
    position:relative;
  }
  label{
    display:block;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:8px;
    letter-spacing:0.05em;
  }
  input[type=text]{
    width:100%;
    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-size:20px;
    padding:14px 16px;
    outline:none;
    transition:border-color .15s ease;
  }
  input[type=text]:focus{
    border-color:var(--gold);
  }
  .row{
    display:flex;
    gap:12px;
    margin-top:16px;
    flex-wrap:wrap;
    align-items:center;
  }
  button{
    background:var(--gold);
    color:#1c1915;
    border:none;
    border-radius:8px;
    padding:12px 22px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.03em;
    transition:transform .12s ease, background .15s ease;
  }
  button:hover{ background:var(--gold-bright); transform:translateY(-1px); }
  button:active{ transform:translateY(0); }
  .toggle{
    display:flex;
    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .toggle button{
    background:transparent;
    color:var(--text-dim);
    border-radius:0;
    padding:10px 16px;
    font-weight:600;
  }
  .toggle button.active{
    background:var(--gold);
    color:#1c1915;
  }

  .flow{
    margin-top:8px;
  }
  .step{
    display:grid;
    grid-template-columns: 92px 1fr;
    gap:16px;
    padding:18px 0;
    border-top:1px solid var(--line);
    align-items:start;
  }
  .step:first-child{border-top:none;}
  .step-label{
    font-size:11px;
    color:var(--gold);
    letter-spacing:0.08em;
    padding-top:4px;
  }
  .step-value{
    font-size:22px;
    word-break:break-all;
    min-height:30px;
    line-height:1.5;
  }
  .step-value.romaji{
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    letter-spacing:0.02em;
    color:var(--gold-bright);
  }
  .step-value.romaji.big{
    font-size:30px;
    font-weight:700;
  }
  .step-value.result{
    font-size:30px;
    font-weight:700;
    color:var(--text);
  }
  .fallback-note{
    display:inline-block;
    margin-top:8px;
    font-size:11px;
    color:var(--danger);
    background:rgba(179,85,47,0.12);
    border:1px solid rgba(179,85,47,0.35);
    padding:4px 10px;
    border-radius:6px;
  }
  .mirror-divider{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--text-dim);
    font-size:11px;
    margin: 4px 0 2px;
  }
  .mirror-divider::before, .mirror-divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  footer{
    text-align:center;
    color:var(--text-dim);
    font-size:11px;
    margin-top:28px;
    line-height:1.8;
  }
  .empty{
    color:var(--text-dim);
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Kana → Romaji → Reverse → Kana<span class="version-badge">v0.2</span></div>
    <h1>反転コト<span>ダマ</span>機</h1>
    <div class="sub">ひらがな・カタカナをローマ字にして、まるごとひっくり返して、<br>読めるところまで読み方を組みなおすヨ。</div>
  </header>

  <div class="panel">
    <label for="kanaInput">ここにひらがな・カタカナを入れるヨ</label>
    <input type="text" id="kanaInput" placeholder="れい：とうきょう" autocomplete="off" spellcheck="false">
    <div class="row">
      <button id="sampleBtn">れいを入れる</button>
      <div class="toggle" id="outToggle">
        <button data-mode="hira" class="active">ひらがな出力</button>
        <button data-mode="kata">カタカナ出力</button>
      </div>
    </div>
  </div>

  <div class="panel flow" id="flowPanel">
    <div class="empty">もじを入れると、ここに変換の道すじが出るヨ。</div>
  </div>

  <footer>
    ※ この変換は正式なローマ字ルールとちょっとちがうかもデス。<br>
    ひっくり返したあとに読めない組み合わせは、アルファベットのまま残すことがあるヨ。
  </footer>
</div>

<script>
(function(){

  // ---- 変換テーブル ----------------------------------------------------
  const MAIN = {
    "あ":"a","い":"i","う":"u","え":"e","お":"o",
    "か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko",
    "さ":"sa","し":"shi","す":"su","せ":"se","そ":"so",
    "た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to",
    "な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no",
    "は":"ha","ひ":"hi","ふ":"fu","へ":"he","ほ":"ho",
    "ま":"ma","み":"mi","む":"mu","め":"me","も":"mo",
    "や":"ya","ゆ":"yu","よ":"yo",
    "ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro",
    "わ":"wa","ゐ":"wi","ゑ":"we","を":"wo","ん":"n",
    "が":"ga","ぎ":"gi","ぐ":"gu","げ":"ge","ご":"go",
    "ざ":"za","じ":"ji","ず":"zu","ぜ":"ze","ぞ":"zo",
    "だ":"da","ぢ":"ji","づ":"zu","で":"de","ど":"do",
    "ば":"ba","び":"bi","ぶ":"bu","べ":"be","ぼ":"bo",
    "ぱ":"pa","ぴ":"pi","ぷ":"pu","ぺ":"pe","ぽ":"po"
  };

  const YOUON = {
    "きゃ":"kya","きゅ":"kyu","きょ":"kyo",
    "しゃ":"sha","しゅ":"shu","しょ":"sho",
    "ちゃ":"cha","ちゅ":"chu","ちょ":"cho",
    "にゃ":"nya","にゅ":"nyu","にょ":"nyo",
    "ひゃ":"hya","ひゅ":"hyu","ひょ":"hyo",
    "みゃ":"mya","みゅ":"myu","みょ":"myo",
    "りゃ":"rya","りゅ":"ryu","りょ":"ryo",
    "ぎゃ":"gya","ぎゅ":"gyu","ぎょ":"gyo",
    "じゃ":"ja","じゅ":"ju","じょ":"jo",
    "ぢゃ":"ja","ぢゅ":"ju","ぢょ":"jo",
    "びゃ":"bya","びゅ":"byu","びょ":"byo",
    "ぴゃ":"pya","ぴゅ":"pyu","ぴょ":"pyo"
  };

  // 逆引き（ローマ字 → かな）を長い順に使う
  function buildReverseTable(){
    const pairs = [];
    for (const k in YOUON) pairs.push([YOUON[k], k]);
    for (const k in MAIN) pairs.push([MAIN[k], k]);
    pairs.sort((a,b)=> b[0].length - a[0].length);
    return pairs;
  }
  const REVERSE_PAIRS = buildReverseTable();
  const CONSONANT = /^[bcdfghjklmpqrstvwxyz]$/;
  const VOWEL = /^[aiueo]$/;

  function kataToHira(s){
    return s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
  }

  // かな → ローマ字
  function kanaToRomaji(input){
    const hira = kataToHira(input);
    const chars = Array.from(hira);
    let romaji = "";
    let sokuon = false;
    let i = 0;
    let hadUnknown = false;

    while (i < chars.length){
      const c = chars[i];

      if (c === "っ" || c === "ッ"){
        sokuon = true; i++; continue;
      }
      if (c === "ー"){
        const m = romaji.match(/[aiueo](?!.*[aiueo])/);
        if (m) romaji += m[0];
        i++; continue;
      }

      let matched = null;
      if (i+1 < chars.length){
        const two = c + chars[i+1];
        if (YOUON[two]){ matched = YOUON[two]; i += 2; }
      }
      if (!matched){
        if (MAIN[c]){ matched = MAIN[c]; i += 1; }
        else {
          matched = c; i += 1; hadUnknown = true;
        }
      }
      if (sokuon){
        if (CONSONANT.test(matched[0])){
          matched = matched[0] + matched;
        }
        sokuon = false;
      }
      romaji += matched;
    }
    return { romaji, hadUnknown };
  }

  // ローマ字 → かな（読めるところまで）
  function romajiToKana(romaji, mode){
    const chars = Array.from(romaji.toLowerCase());
    let out = "";
    let i = 0;
    let hadFallback = false;

    while (i < chars.length){
      // 促音チェック：同じ子音が2連続
      if (i+1 < chars.length && chars[i] === chars[i+1] && CONSONANT.test(chars[i])){
        out += (mode === "kata") ? "ッ" : "っ";
        i += 1;
        continue;
      }
      // 長音チェック：同じ母音が2連続
      if (i+1 < chars.length && chars[i] === chars[i+1] && VOWEL.test(chars[i])){
        let matchedVowel = null;
        for (const [r,k] of REVERSE_PAIRS){
          if (r === chars[i] && chars.slice(i, i+r.length).join("") === r){
            matchedVowel = k; break;
          }
        }
        if (matchedVowel){
          out += (mode === "kata") ? toKata(matchedVowel) : matchedVowel;
          out += "ー";
          i += 2;
          continue;
        }
      }

      // 通常の最長一致
      let found = null;
      for (const [r,k] of REVERSE_PAIRS){
        if (chars.slice(i, i+r.length).join("") === r){
          found = [r,k]; break;
        }
      }
      if (found){
        out += (mode === "kata") ? toKata(found[1]) : found[1];
        i += found[0].length;
      } else {
        out += chars[i]; // 読めないので、そのまま英字を残す
        hadFallback = true;
        i += 1;
      }
    }
    return { text: out, hadFallback };
  }

  function toKata(hira){
    return hira.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
  }

  // ---- UI ---------------------------------------------------------------
  const input = document.getElementById("kanaInput");
  const flowPanel = document.getElementById("flowPanel");
  const sampleBtn = document.getElementById("sampleBtn");
  const outToggle = document.getElementById("outToggle");

  let outMode = "hira";

  outToggle.addEventListener("click", (e)=>{
    const btn = e.target.closest("button");
    if (!btn) return;
    outToggle.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    outMode = btn.dataset.mode;
    render();
  });

  sampleBtn.addEventListener("click", ()=>{
    input.value = "とうきょうタワー";
    render();
  });

  input.addEventListener("input", render);

  function render(){
    const val = input.value.trim();
    if (!val){
      flowPanel.innerHTML = '<div class="empty">もじを入れると、ここに変換の道すじが出るヨ。</div>';
      return;
    }

    const { romaji, hadUnknown } = kanaToRomaji(val);
    const directReversed = Array.from(val).reverse().join("");
    const reversed = Array.from(romaji).reverse().join("");
    const { text: kanaResult, hadFallback } = romajiToKana(reversed, outMode);

    flowPanel.innerHTML = `
      <div class="step">
        <div class="step-label">01 入力</div>
        <div class="step-value">${escapeHtml(val)}</div>
      </div>
      <div class="step">
        <div class="step-label">01.5 そのまま反転</div>
        <div class="step-value result">${escapeHtml(directReversed)}</div>
      </div>
      <div class="step">
        <div class="step-label">02 ローマ字</div>
        <div class="step-value romaji">${escapeHtml(romaji)}</div>
      </div>
      <div class="mirror-divider">ここでひっくり返すヨ</div>
      <div class="step">
        <div class="step-label">03 反転</div>
        <div class="step-value romaji big">${escapeHtml(reversed)}</div>
      </div>
      <div class="step">
        <div class="step-label">04 読み方</div>
        <div class="step-value result">${escapeHtml(kanaResult)}</div>
        ${hadFallback ? '<div class="fallback-note">※ 一部、かなに直せずアルファベットのまま残ったトコあるヨ</div>' : ''}
      </div>
    `;
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

})();
</script>
</body>
</html>
